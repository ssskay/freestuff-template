name: Weekly resource verification

# Runs the verifier agent on a schedule and opens a PR with any changes for a
# human to review and merge. Never pushes to main directly.
#
# One-time setup (you):
#   1. Settings -> Secrets and variables -> Actions -> add ANTHROPIC_API_KEY.
#   2. Settings -> Actions -> General -> Workflow permissions ->
#      "Read and write permissions" + "Allow GitHub Actions to create PRs".

on:
  schedule:
    - cron: '0 14 * * 0' # Sundays 14:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  # Keyless: catch dead links + stale entries every week with no API key and no
  # cost. Non-fatal (|| true) so it never turns the weekly run red — the report
  # lands in the run summary and broken links surface as inline annotations.
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check links + staleness (no API key)
        run: |
          python3 agents/freshness_check.py || true
          cat freshness-report.md >> "$GITHUB_STEP_SUMMARY"

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Until ANTHROPIC_API_KEY is set (see one-time setup above), skip the run
      # cleanly instead of failing — a dormant verifier should be green, not a
      # weekly red X in your inbox. Adding the secret activates it automatically.
      - name: Check for API key
        id: check
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY not set — skipping verifier run. Add the secret to activate it."
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.has_key == 'true'
        with:
          python-version: '3.12'

      - name: Install agent dependencies
        if: steps.check.outputs.has_key == 'true'
        run: pip install -r agents/requirements.txt

      - name: Run verifier
        if: steps.check.outputs.has_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 agents/verify.py

      - name: Open pull request with changes
        if: steps.check.outputs.has_key == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: agent/verify
          title: 'Weekly verification: resource updates'
          commit-message: 'Agent: weekly resource verification'
          body: |
            Automated weekly run of `agents/verify.py`.

            Review the status changes in `src/content/resources.json`, the
            `verification-report.md`, and the maintenance metrics in
            `agents/metrics/history.jsonl` (human-review minutes, LLM cost),
            then merge if they look right.
          add-paths: |
            src/content/resources.json
            verification-report.md
            agents/metrics/history.jsonl
